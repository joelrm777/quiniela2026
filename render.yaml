services:
  - type: web
    name: quiniela-mundial
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Se ingresa manualmente en el dashboard de Render
      - key: SECRET_KEY
        sync: false   # Se ingresa manualmente en el dashboard de Render
